name: eda-report
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas>=2.0
  - numpy>=1.26
  - pyreadstat>=1.2
  - pip:
      - plotnine>=0.13
      - mizani>=0.11
      - great-tables>=0.14
      - fastapi>=0.110
      - uvicorn>=0.29
      - jinja2>=3.1
      - click>=8.1
      - pytest>=8.0
      - pytest-cov>=5.0
      - ruff>=0.4

# NOTE: Quarto must be installed separately.
# Download from https://quarto.org/docs/get-started/ and ensure
# `quarto` is available on your PATH before running eda-report.
#
# Verify: quarto --version  (should be >= 1.5)
